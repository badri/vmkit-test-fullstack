service: vmkit-test-fullstack-staging
image: badri/vmkit-test-fullstack
servers:
  web:
    hosts:
    - $DEST_VM_HOST
proxy:
  ssl: false
  host: vmkit-test-fullstack-staging.vmkit.app
  app_port: 8000
  healthcheck:
    path: /health
    interval: 3
    timeout: 30
registry:
  server: ghcr.io
  username: vmkit-deploy[bot]
  password:
  - KAMAL_REGISTRY_PASSWORD
ssh:
  user: kamal
builder:
  arch: arm64
env:
  clear:
    PYTHONUNBUFFERED: '1'
  secret:
  - DATABASE_URL
  - REDIS_URL
accessories:
  postgres:
    image: postgres:16-alpine
    host: vmkit-test-fullstack-staging.vmkit.app
    port: 5432
    env:
      clear:
        POSTGRES_USER: demo
        POSTGRES_DB: demo
      secret:
      - POSTGRES_PASSWORD
    volumes:
    - vmkit-test-fullstack-staging-postgres:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    host: vmkit-test-fullstack-staging.vmkit.app
    port: 6379
